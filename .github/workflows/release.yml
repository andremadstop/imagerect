name: Release Build

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: ImageRect-linux
          - os: windows-latest
            artifact: ImageRect-windows
          - os: macos-latest
            artifact: ImageRect-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller
      - name: Build executable
        run: pyinstaller imagerect.spec --clean --noconfirm
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  build-windows-installer:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ImageRect-windows
          path: dist/
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build installer
        run: iscc installer/imagerect.iss
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ImageRect-windows-installer
          path: dist/installer/ImageRect-*-Setup.exe

  release:
    needs: [build, build-windows-installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
