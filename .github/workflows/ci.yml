name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check
        run: mypy core/ ui/ main.py --ignore-missing-imports
      - name: Tests + Coverage
        run: QT_QPA_PLATFORM=offscreen pytest -v
      - name: Smoke test
        run: QT_QPA_PLATFORM=offscreen python main.py --smoke-test
